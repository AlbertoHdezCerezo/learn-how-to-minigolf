name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  gut:
    name: Run GUT tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false

      - name: Import project
        run: godot --headless --path . --import --quit 2>/dev/null || true

      - name: Run tests
        run: |
          godot --headless --path . -d \
            -s res://addons/gut/gut_cmdln.gd \
            -gjunit_xml_file=results.xml

      - name: Publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: results.xml
          check_name: GUT Test Report
          include_passed: true
          comment: true
          detailed_summary: false
